<!doctype html><html><head><meta charset='utf-8'><title>Fallout 76 Build Agent</title>
<style>body{font-family:Arial;max-width:1100px;margin:20px auto}label{display:block;margin:8px 0 2px}textarea,select,input{width:100%;padding:8px}button{margin-top:12px;padding:10px 16px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}</style></head>
<body><h1>Fallout 76 SPECIAL + Perk Card Build Agent</h1>
<p>Generate validated Fallout 76 builds with source-aware recommendations.</p>
<a href='/compare'>Compare Builds</a>
<div class='grid'>
<div><label>Character level</label><select id='character_level'><option>50+</option><option>Under 50</option><option>100+</option><option>300+</option><option>I do not know</option></select></div>
<div><label>Primary playstyle</label><select id='primary_playstyle'><option>Power Armor Heavy</option><option>Commando</option></select></div>
<div><label>Primary weapon type</label><select id='primary_weapon_type'><option>Heavy energy</option><option>Heavy ballistic</option></select></div>
<div><label>Armor type</label><select id='armor_type'><option>Power Armor</option><option>Regular armor</option></select></div>
<div><label>Health model</label><select id='health_model'><option>Full health</option><option>Bloodied / low health</option></select></div>
<div><label>Combat style</label><select id='combat_style'><option>Balanced</option><option>VATS</option><option>Non-VATS</option></select></div>
<div><label>Team preference</label><select id='team_preference'><option>Public team</option><option>Solo</option></select></div>
<div><label>Mutation preference</label><select id='mutation_preference'><option>Use mutations</option><option>No mutations</option></select></div>
<div><label>Quality-of-life preference</label><select id='qol_preference'><option>Balanced</option><option>Carry weight</option></select></div>
<div><label>Legendary perk availability</label><select id='legendary_perk_availability'><option>Some</option><option>None</option><option>Fully unlocked</option></select></div>
</div>
<label>Specific preferred weapons</label><input id='preferred_weapons' value='Gatling Plasma, Gatling Laser'>
<label>Current gear</label><textarea id='current_gear'></textarea>
<label>Avoid list</label><textarea id='avoid_list'>No stealth</textarea>
<button onclick='gen()'>Create Build</button><button onclick='upd()'>Update Perk Database</button>
<pre id='out'></pre>
<script>
async function gen(){const body={};['character_level','primary_playstyle','primary_weapon_type','preferred_weapons','armor_type','health_model','combat_style','team_preference','mutation_preference','qol_preference','legendary_perk_availability','current_gear','avoid_list'].forEach(k=>body[k]=document.getElementById(k).value);const r=await fetch('/api/build/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});document.getElementById('out').textContent=JSON.stringify(await r.json(),null,2)}
async function upd(){const r=await fetch('/api/research/update',{method:'POST'});alert((await r.json()).message)}
</script></body></html>
