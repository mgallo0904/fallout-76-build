<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Compare Builds</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">
      <span class="brand-mark">76</span>
      <span>
        <strong>Build Compare</strong>
        <small>SPECIAL spread and core perk lanes</small>
      </span>
    </a>
    <nav class="nav-actions" aria-label="Primary">
      <a href="/">Builder</a>
      <a href="/planner">Planner</a>
      <span id="brainBadge" class="status-pill">Brain offline</span>
    </nav>
  </header>

  <main class="compare-shell">
    <section class="builder-shell">
      <div class="section-head">
        <div>
          <p class="eyebrow">Loadout audit</p>
          <h1>Compare saved builds</h1>
        </div>
        <button id="compareBtn" class="primary-action" type="button">Compare</button>
      </div>

      <label class="wide">
        Build IDs
        <textarea id="ids" rows="4" placeholder="build-abc123, build-def456"></textarea>
      </label>

      <div class="intel-block inline-block">
        <div class="block-title">Recent builds</div>
        <div id="recentBuilds" class="tag-cloud"></div>
      </div>
    </section>
  </main>

  <section id="compareOut" class="results-shell hidden" aria-live="polite"></section>

  <script src="/static/compare.js"></script>
</body>
</html>
