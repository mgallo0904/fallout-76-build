<!doctype html>
<html><head><meta charset='utf-8'><title>Compare Builds</title></head>
<body>
<h2>Compare Builds</h2>
<p>Enter 2-4 build IDs generated by the app to compare SPECIAL and core perk differences.</p>
<input id='ids' style='width:100%' placeholder='build-abc123,build-def456'>
<button onclick='compare()'>Compare</button>
<pre id='out'></pre>
<script>
async function compare(){
 const ids=document.getElementById('ids').value.split(',').map(x=>x.trim()).filter(Boolean);
 const r=await fetch('/api/build/compare',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({build_ids:ids})});
 document.getElementById('out').textContent=JSON.stringify(await r.json(),null,2);
}
</script>
</body></html>
